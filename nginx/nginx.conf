events {
    worker_connections 1024;
}

http {
    # Rate limiting (basic abuse protection)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=generate:10m rate=2r/s;

    # File upload size (for photos)
    client_max_body_size 20M;

    # Proxy cache for template images and downloads
    proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=img_cache:10m max_size=200m inactive=24h;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # --- Template images & downloads → Cached ---
        location ~ ^/api/(templates/.*/image|download/) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache these responses for 1 hour
            proxy_cache img_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # --- Generate endpoint → Strict rate limit ---
        location /api/generate {
            limit_req zone=generate burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # --- Other API requests → Backend ---
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for image processing
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://backend;
        }

        # --- Everything else → Frontend ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR (dev) and live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
